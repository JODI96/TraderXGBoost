services:
  - type: web
    name: traderxgboost
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python render_sim.py --data Data/BTCUSDT/monthly/2026-01_1m.csv --speed 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
