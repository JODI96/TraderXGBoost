# ─────────────────────────────────────────────────────────────────────────────
# Best Configuration – Checkpoint (profitable at T=0.64)
# ─────────────────────────────────────────────────────────────────────────────
# Result:  +2.4% return, 83 trades (~0.4/day), win_rate=44.6%, PF=1.241
# Test period: 2025-05-26 to 2025-12-31 (218 days)
# ─────────────────────────────────────────────────────────────────────────────

labels:
  L_range:   20
  H_horizon: 20        # 20-bar (20-min) trade window
  k_atr:     5
  L_atr:     7
  sl_pct:    0.0015    # 0.15% stop-loss
  tp_pct:    0.0045    # 0.45% take-profit (1:3 RR)
  sl_atr:    2         # fallback only
  rr_ratio:  3         # fallback only
  maker_fee: 0.0002
  taker_fee: 0.0000
  slippage:  0.0000
  spread:    0.0000
  n_classes: 3

training:
  break_weight: 10.0   # half-balance for 3% label rate; good calibration
  xgb_params:
    n_estimators:     5000
    learning_rate:    0.01
    max_depth:        5
    min_child_weight: 10
    subsample:        0.60
    colsample_bytree: 0.70
    gamma:            0
    reg_alpha:        1.0
    reg_lambda:       1.0
  early_stopping_rounds: 50
  # WF-CV selected n_estimators: 1235 trees (all 5 folds valid)

trading:
  T_up:            0.64   # profitable threshold
  T_down:          0.64
  d_max_atr:       1.5
  require_squeeze: false
  sl_pct:          0.0015
  tp_pct:          0.0045
  sl_atr:          2      # fallback
  tp_atr:          6      # fallback
  time_stop:       20
  cooldown:        5
  max_positions:   1
  initial_capital: 10000.0
  position_size_pct: 1.0

# ─────────────────────────────────────────────────────────────────────────────
