# =============================================================================
# Best Parameters – Run 25 (Multi-coin training BTC+ETH+SOL + 3x leverage)
# =============================================================================
# Best return:    T=0.62  ->  +13.85%, 276 trades (~1.3/day), win=38.4%, PF=1.13
# Best quality:   T=0.66  ->  +10.98%,  88 trades (~0.4/day), win=42.0%, PF=1.30
# Safest:         T=0.68  ->  +11.12%,  43 trades (~0.2/day), win=46.5%, PF=1.72
# Test period:    2025-05-26 to 2025-12-31 (218 days)
# n_estimators:   2225 (WF-CV, all 5 folds valid)
# Training coins: BTCUSDT + ETHUSDT + SOLUSDT (4.7M rows, 14.7 min on RTX 3080)
# Trading coin:   BTCUSDT only (ETH/SOL PCT barriers not calibrated)
#
# Full BTC threshold scan (3x leverage, time_stop=30):
#   T=0.58  ->  -45.6%,  693 trades (~3.2/day), win=33.2%, PF=0.78, DD=-53.6%
#   T=0.60  ->  -17.2%,  450 trades (~2.1/day), win=34.9%, PF=0.89, DD=-37.5%
#   T=0.62  ->  +13.85%, 276 trades (~1.3/day), win=38.4%, PF=1.13, DD=-17.6%  <- BEST RETURN
#   T=0.64  ->   +0.83%, 158 trades (~0.7/day), win=36.1%, PF=1.01, DD= -9.4%
#   T=0.66  ->  +10.98%,  88 trades (~0.4/day), win=42.0%, PF=1.30, DD= -6.6%  <- BALANCED
#   T=0.68  ->  +11.12%,  43 trades (~0.2/day), win=46.5%, PF=1.72, DD= -5.1%  <- SAFEST
# =============================================================================

data:
  coins:
    - BTCUSDT   # training coins
    - ETHUSDT
    - SOLUSDT
  trade_symbol: BTCUSDT   # backtest/live trading on BTC only

labels:
  L_range:   20
  H_horizon: 20        # strict 20-bar labels; TP win rate = 80% across all coins
  k_atr:     5
  L_atr:     7
  sl_pct:    0.0015    # 0.15% SL — calibrated for BTC; too tight for ETH/SOL
  tp_pct:    0.0045    # 0.45% TP (1:3 RR)
  sl_atr:    2
  rr_ratio:  3
  maker_fee: 0.0002
  taker_fee: 0.0000
  slippage:  0.0000
  spread:    0.0000
  n_classes: 3

training:
  break_weight: 10.0
  xgb_params:
    n_estimators:     5000    # cap; early stopping fires at ~2225
    learning_rate:    0.01
    max_depth:        5
    min_child_weight: 10
    subsample:        0.60
    colsample_bytree: 0.70
    gamma:            0
    reg_alpha:        1.0
    reg_lambda:       1.0
    tree_method:      "hist"
    device:           "cuda"  # GPU training (RTX 3080); 14.7 min for 4.7M rows
  early_stopping_rounds: 50

trading:
  T_up:            0.66   # balanced threshold: good return + manageable drawdown
  T_down:          0.66
  d_max_atr:       1.5
  require_squeeze: false
  sl_pct:          0.0015
  tp_pct:          0.0045
  sl_atr:          2
  tp_atr:          6
  time_stop:       30     # > H_horizon=20; empirically better at every threshold
  cooldown:        5
  max_positions:   1
  initial_capital: 10000.0
  position_size_pct: 3.0  # 3x leverage; SL=-0.45% capital, TP=+1.35% capital

# =============================================================================
# KEY DISCOVERIES (Run 25)
# =============================================================================
#
# 1. Multi-coin training dramatically improves BTC signal quality
#    BTC-only model:   T=0.62 -> -0.17% (barely breakeven)
#    3-coin model:     T=0.62 -> +13.85% (+3x leverage)
#    More training data diversity = better generalisation on BTC patterns
#
# 2. ETH + SOL backtest broken with 0.15% PCT SL
#    ETH: 3,389 trades at T=0.58 vs 693 BTC trades; win rate 31-33%
#    SOL: 3,184 trades at T=0.58; win rate 31-33%
#    Root cause: 0.15% SL calibrated for BTC volatility; ETH/SOL move 2-3x more
#    Fix needed: ATR-based SL/TP per coin (future experiment)
#
# 3. T=0.62 is now the best return threshold (was T=0.64 in single-coin)
#    Multi-coin model generates more high-confidence signals at lower thresholds
#    n_estimators grew 1359 -> 2225 (more data, more trees needed)
#
# 4. 3x leverage parameters:
#    Winning trade: +1.35% of capital
#    Losing trade:  -0.45% of capital
#    At T=0.66 (42% win, 1:3 RR): expected +0.23% per trade on capital
#
# 5. GPU inference added to backtest.py
#    model.set_param({"device": "cuda"}) before batch prediction
#    Per-bar inference (live/replay) stays on CPU (GPU overhead > compute time)
#
# =============================================================================
# NEXT EXPERIMENTS
# =============================================================================
#
# A. Fine-grained T scan (0.60 to 0.68 in 0.01 steps) to find exact peak
#
# B. ATR-based SL/TP for ETH/SOL to unlock multi-coin trading
#    ETH: sl_atr=2, tp_atr=6 adapts to coin volatility
#    Could add +10-15% more returns from ETH/SOL signals
#
# C. Add BNB, XRP to training for even more diversity
#    All data already present in Data/ directory
#
# D. Reduce cooldown 5->2 bars at T=0.66 to increase trade frequency
#    Currently 5-bar cooldown after each trade
# =============================================================================
